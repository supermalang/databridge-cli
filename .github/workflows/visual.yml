name: Visual

# Runs the Playwright visual harness (VIS-1): every UI change is screenshotted at
# mobile/tablet/desktop and diffed against the committed baselines.
on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/visual.yml'

jobs:
  visual:
    name: Playwright visual baselines (mobile/tablet/desktop)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Install Chromium (+ OS deps)
        run: npx playwright install --with-deps chromium
      - name: Run visual tests
        run: npm run test:e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
