name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      MPLBACKEND: Agg          # headless matplotlib for chart-rendering tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        # Tests self-configure a SQLite DB + local storage (see tests/conftest.py),
        # so no Postgres/Minio services are needed here.
        run: python -m pytest -q

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build production image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: databridge:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
