name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]          # version tags (e.g. v1.0.0) → publish the image
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      MPLBACKEND: Agg          # headless matplotlib for chart-rendering tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        # Tests self-configure a SQLite DB + local storage (see tests/conftest.py),
        # so no Postgres/Minio services are needed here.
        run: python -m pytest -q

  # Validate the image builds on branch pushes + PRs (no registry, no credentials).
  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build production image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: databridge:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Publish to Docker Hub only on a version tag, and only if tests passed.
  # Requires repo secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN (an access token).
  publish:
    name: Publish image to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/databridge-cli
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
