services:

  app:
    build: .
    container_name: kobo-reporter-app
    restart: unless-stopped
    volumes:
      - ./config.yml:/app/config.yml
      - ./data:/app/data
      - ./reports:/app/reports
      - ./templates:/app/templates
      - ./references:/app/references
    environment:
      - KOBO_TOKEN=${KOBO_TOKEN}
      - DB_USER=${DB_USER:-}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kobo-reporter.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.kobo-reporter.entrypoints=websecure"
      - "traefik.http.routers.kobo-reporter.tls.certresolver=letsencrypt"
      - "traefik.http.services.kobo-reporter.loadbalancer.server.port=8000"
      - "traefik.http.routers.kobo-reporter.middlewares=kobo-auth"
      - "traefik.http.middlewares.kobo-auth.basicauth.users=${BASIC_AUTH_USERS}"
    networks:
      - traefik-public

  terminal:
    image: tsl0922/ttyd:latest
    container_name: kobo-reporter-terminal
    restart: unless-stopped
    volumes:
      - ./config.yml:/app/config.yml
      - ./data:/app/data
      - ./reports:/app/reports
      - ./templates:/app/templates
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
    working_dir: /app
    entrypoint: >
      sh -c "pip install -q -r requirements.txt &&
             ttyd -p 7681 -t fontSize=14 -t theme=monokai bash"
    environment:
      - KOBO_TOKEN=${KOBO_TOKEN}
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kobo-terminal.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/terminal`)"
      - "traefik.http.routers.kobo-terminal.entrypoints=websecure"
      - "traefik.http.routers.kobo-terminal.tls.certresolver=letsencrypt"
      - "traefik.http.services.kobo-terminal.loadbalancer.server.port=7681"
      - "traefik.http.routers.kobo-terminal.middlewares=kobo-auth,kobo-terminal-strip"
      - "traefik.http.middlewares.kobo-terminal-strip.stripprefix.prefixes=/terminal"
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
