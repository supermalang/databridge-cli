name: databridge-dev

# Compose-based dev container: the `app` service is where you work (built from the existing
# Dockerfile); `db` (Postgres) and `minio` (object storage) are siblings on the default
# network, reachable from the app as `db:5432` / `minio:9000`. A one-shot `createbucket`
# job ensures the `databridge` bucket exists. Data persists in named volumes across rebuilds.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    # Dev-only memory caps, budgeted for a 3 GB host: the four limits sum to
    # ~2.5g, leaving ~500m for the host OS + Docker daemon. mem_limit is the
    # hard ceiling (OOM-kills past it); mem_reservation is a soft floor.
    mem_limit: 1536m
    mem_reservation: 512m
    volumes:
      - ..:/workspaces/databridge-cli:cached
      - npm-global:/home/vscode/.npm-global
      - zsh-history:/home/vscode/.zsh_history
    environment:
      PYTHONUNBUFFERED: "1"
      # Auto-wired infra (service hostnames). Dev-only creds — safe to commit.
      DATABASE_URL: postgresql+psycopg2://postgres:dev@db:5432/databridge
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      S3_BUCKET: databridge
      S3_REGION: us-east-1
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  db:
    image: postgres:16
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: databridge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d databridge"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"   # optional: connect from a host DB client

  minio:
    image: minio/minio
    mem_limit: 384m
    mem_reservation: 128m
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console

  createbucket:
    image: minio/mc
    mem_limit: 64m
    depends_on:
      minio:
        condition: service_started
    # Wait for Minio, then create the bucket (idempotent). Exits when done.
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minio minio12345; do
        echo 'waiting for minio...'; sleep 2;
      done &&
      mc mb --ignore-existing local/databridge &&
      echo 'bucket databridge ready'
      "
    restart: "no"

volumes:
  pgdata:
  miniodata:
  npm-global:
  zsh-history:
