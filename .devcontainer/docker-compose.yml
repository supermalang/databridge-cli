name: databridge-dev

# Compose-based dev container: the `app` service is where you work (built from the existing
# Dockerfile); `db` (Postgres) and `minio` (object storage) are siblings on the default
# network, reachable from the app as `db:5432` / `minio:9000`. A one-shot `createbucket`
# job ensures the `databridge` bucket exists. Data persists in named volumes across rebuilds.
#
# MEMORY BUDGET — sized for a 4 GB WSL VM running ONE project at a time:
#   app   2048m  (the IDE lives here: VS Code Server + Pylance + Node + Claude + Playwright)
#   db     512m
#   minio  384m
#   ----------- persistent total ~2944m, leaving ~1.1g for WSL2 + Docker daemon overhead.
# createbucket (64m) is a one-shot that exits, so it doesn't count against the steady state.
# NOTE: this does NOT leave room for a second project's stack. Run one at a time
# (`docker compose stop` the other), or raise the VM to 8 GB to run both live.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    # mem_limit is the hard ceiling (OOM-kills past it); mem_reservation is the soft floor.
    # 2 GB because Pylance indexing alone can spike ~0.5–1 GB on top of the rest of the toolchain.
    mem_limit: 2048m
    mem_reservation: 1024m
    volumes:
      - ..:/workspaces/databridge-cli:cached
      - npm-global:/home/vscode/.npm-global
      - zsh-history:/home/vscode/.zsh_history
    environment:
      PYTHONUNBUFFERED: "1"
      # Auto-wired infra (service hostnames). Dev-only creds — safe to commit.
      DATABASE_URL: postgresql+psycopg2://postgres:dev@db:5432/databridge
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      S3_BUCKET: databridge
      S3_REGION: us-east-1
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  db:
    image: postgres:16
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: databridge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d databridge"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"   # optional: connect from a host DB client

  minio:
    image: minio/minio
    mem_limit: 384m
    mem_reservation: 128m
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console

  createbucket:
    image: minio/mc
    mem_limit: 64m
    depends_on:
      minio:
        condition: service_started
    # Wait for Minio, then create the bucket (idempotent). Exits when done.
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minio minio12345; do
        echo 'waiting for minio...'; sleep 2;
      done &&
      mc mb --ignore-existing local/databridge &&
      echo 'bucket databridge ready'
      "
    restart: "no"

volumes:
  pgdata:
  miniodata:
  npm-global:
  zsh-history: