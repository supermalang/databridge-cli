#     format: number
#
#   - name: unique_beneficiaries
#     label: Unique beneficiaries reached
#     question: Beneficiary_ID
#     stat: count
#     dedup_by: Beneficiary_ID   # deduplicate by this column first (same as count_distinct here)
#     format: number
#
#   # Multi-column indicator: combine several questions row-wise, then apply the stat
#   - name: total_personnes_handicapees
#     label: Total personnes handicapées
#     questions: [Garcons, Filles, Hommes, Femmes]  # array of columns to combine
#     combine: sum        # sum|mean|min|max — how to merge columns per row (default: sum)
#     stat: sum           # stat applied to the combined series
#     format: number
#
#   - name: pct_female
#     label: Female beneficiaries
#     question: Gender
#     stat: percent
#     filter_value: "Female"     # required for stat: percent
#     format: percent
#     decimals: 1                # decimal places (default 1)
#
#   - name: avg_household_size
#     label: Average household size
#     question: Household_Size
#     stat: mean
#     format: decimal
#
#   - name: top_region
#     label: Most represented region
#     question: Region
#     stat: most_common
#     format: text
#
# Per-indicator data scoping (optional):
#   source : "main" (default) | repeat-group path e.g. "household/members"
#   filter : pandas .query() expression applied before computing
#   sample : limit to N random rows before computing
#
# Example — count adult members from a repeat group:
#   - name: total_adults
#     source: "household/members"
#     filter: "Age >= 18"
#     stat: count
#     format: number
#
# Baseline and target tracking (optional):
#   baseline     : previous measurement value (numeric)
#                  Exposes {{ ind_<name>_baseline }} in Word template
#   target       : goal value (numeric)
#                  Exposes {{ ind_<name>_target }} and {{ ind_<name>_pct_achievement }} in Word template
#
# Example — indicator with achievement tracking:
#   - name: pct_female
#     label: Female beneficiaries
#     question: Gender
#     stat: percent
#     filter_value: "Female"
#     format: percent
#     baseline: 48.2
#     target: 55.0
#     # Template: "{{ ind_pct_female }} (target {{ ind_pct_female_target }}, {{ ind_pct_female_pct_achievement }} achieved)"
#
# In your Word template: "This report covers {{ ind_total_beneficiaries }}
# beneficiaries. {{ ind_pct_female }} are female."

# Text summaries → {{ summary_<name> }} placeholders in Word template
# Each summary produces a paragraph of text computed from the data.
# stat types:
#   distribution      : top-N breakdown for one categorical column
#   stats             : mean/median/range for one numeric column
#   crosstab          : row × column percentage breakdown for two categorical columns
#   trend             : time-series count or sum over a date column
#   data_quality      : completeness %, duplicates, and outlier flags
#   keyword_frequency : top-N word frequencies for one text column
#   correlation       : Pearson/Spearman correlation pairs for numeric columns
#   ai                : AI-generated paragraph (requires ai: section)
#
# Per-summary data scoping (optional — same keys as charts):
#   source : "main" | repeat-group path
#   filter : pandas .query() expression
#   sample : limit to N random rows
summaries: []
