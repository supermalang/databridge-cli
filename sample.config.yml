# kobo-reporter · config.yml
# Single source of truth. Copy to config.yml and fill in your values.

api:
  platform: kobo            # kobo | ona
  url: https://kf.kobotoolbox.org/api/v2
  # For Ona:
  #   platform: ona
  #   url: https://api.ona.io/api/v1
  token: env:KOBO_TOKEN

form:
  uid: aAbBcCdDeEfFgGhH
  alias: monitoring_survey

# Auto-filled by fetch-questions — edit after
# For free-text (qualitative) questions you can add a classify: block so that
# `classify-text` clusters responses into themes and writes a *_cluster column:
#
#   - kobo_key: main_problem
#     export_label: Main_Problem
#     label: What is the main problem in your area?
#     type: text
#     category: qualitative
#     classify:
#       enabled: true
#       theme_count: 5        # how many themes to discover (default: 5)
#       themes: []            # auto-filled after first run; you can edit these
#
# After running classify-text, point your charts at the cluster column:
#   questions: [Main_Problem_cluster]
questions: []

# pandas .query() syntax — applied to all downloaded data
filters: []
# filters:
#   - "Age > 0"
#   - "Region != 'Test'"
#   - "submission_date >= '2025-01-01'"

