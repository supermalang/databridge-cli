#     type: likert
#     questions: [Satisfaction]     # column with scale responses
#     options:
#       scale: ["Very dissatisfied", "Dissatisfied", "Neutral", "Satisfied", "Very satisfied"]
#       neutral: "Neutral"
#
#   - name: kpi_summary
#     title: Key indicators
#     type: scorecard
#     questions: [Beneficiary_ID, Age, Household_Size]  # one card per question
#     options:
#       columns: 3        # cards per row
#       stat: count       # count | mean | sum
#       color: "#1D9E75"
#
#   - name: age_gender_pyramid
#     title: Population pyramid
#     type: pyramid
#     questions: [Age_Group, Gender]  # [age_group, gender]
#     options:
#       male_value: "Male"
#       female_value: "Female"
#
#   - name: site_map
#     title: Survey site locations
#     type: dot_map
#     questions: [gps_latitude, gps_longitude]  # [lat, lon] columns
#     options:
#       basemap: false      # true = add OpenStreetMap tiles (requires contextily + pyproj)
#       color_by: Region    # optional — color dots by a categorical column
#       size: 20            # dot size in points
#
# Supported types: bar | horizontal_bar | stacked_bar | grouped_bar | pie | donut |
#   line | area | histogram | scatter | box_plot | heatmap | treemap |
#   waterfall | funnel | table | bullet_chart | likert | scorecard | pyramid
#
# Per-chart data scoping (optional — applied on top of global filters):
#   source : "main" (default) | repeat-group path e.g. "household/members"
#            Explicit source avoids the auto-heuristic and prevents ambiguity.
#   filter : pandas .query() expression applied after source selection.
#            e.g. filter: "Region == 'North'"
#   sample : limit to this many random rows before charting (integer).
#            Useful for exploratory charts on large datasets.
#
# Repeat-group aggregation (requires source: pointing to a repeat table):
#   aggregate:
#     group_by : column to group on (default: _parent_index)
#     count_as : count rows per group → new column with this name
#     sum_col  : sum this column per group
#     mean_col : average this column per group
#     min_col  : min of this column per group
#     max_col  : max of this column per group
#
# Example — chart only northern data:
#   - name: northern_satisfaction
#     title: Satisfaction (North only)
#     type: horizontal_bar
#     questions: [Satisfaction]
#     filter: "Region == 'North'"
#
# Example — chart from repeat group directly:
#   - name: member_age_dist
#     title: Household member age distribution
#     type: histogram
#     questions: [Age]
#     source: "household/members"
#
# Example — aggregate repeat rows before charting (household size distribution):
#   - name: household_size
#     title: Members per household
#     type: histogram
#     source: "household/members"
#     aggregate:
#       group_by: _parent_index
#       count_as: n_members
#     questions: [n_members]
#
# Common options (all chart types):
#   top_n          : max categories to show (default 15, pie/donut default 8)
#   width_inches   : chart width in inches (default varies by type)
#   height_inches  : chart height in inches
#   color          : hex color for single-series charts (e.g. "#D85A30")
#   xlabel / ylabel: axis label overrides
#   distinct_by    : column to deduplicate rows before charting (e.g. Beneficiary_ID)
#   expand_multi   : true → split space-separated select_multiple values before counting
#                    (bar, horizontal_bar, pie, donut, treemap, waterfall, funnel, table, likert)
#                    Note: choice labels that contain spaces will be split incorrectly
# Per-type options:
#   sort      (bar, horizontal_bar, grouped_bar, waterfall): "value"|"label"|"none"
#   normalize (stacked_bar): true → 100% stacked
#   bins      (histogram): number of bins (default 15)
#   freq      (line, area): "day" | "week" | "month" | "year"
#   target    (bullet_chart): REQUIRED integer target value
#   scale     (likert): ordered list of response labels
#   neutral   (likert): label of the neutral/midpoint response
#   stat      (scorecard): "count" | "mean" | "sum"
#   columns   (scorecard): number of cards per row (default 3)
#   male_value / female_value (pyramid): strings matching gender column values
#
# Examples using distinct_by and expand_multi:
#   - name: unique_communes_bar
#     title: Submissions per commune (unique beneficiaries only)
#     type: bar
#     questions: [Commune]
#     options:
#       distinct_by: Beneficiary_ID   # count each beneficiary once even across multiple submissions
#
#   - name: coping_strategies
#     title: Coping strategies used
#     type: horizontal_bar
#     questions: [Coping_Strategies]  # select_multiple column
#     options:
#       expand_multi: true            # splits "strategy1 strategy2" → counts each choice separately
#       top_n: 10

# Text/number indicators → {{ ind_<name> }} placeholders in Word template
# Use these for key figures that appear inline in text, not as chart images.
indicators: []
